name: build-daily-driver

# Builds a DEBUG manager APK from the daily-driver branch: 13.7.0 + every fix
# from 2026-07-10 in its FINAL form (#188 probe + #237, #221, #204, #197,
# #235, #201 both halves, watchdog/TCP warning) with the test-only scaffolding
# stripped (no #221 boot notification, no #197 pairing-code debug log). Meant
# to actually daily-drive, not just harness-test. Still a debug APK, not a release.
on:
  push:
    branches:
      - daily-driver-2026-07-10
  workflow_dispatch:

concurrency:
  group: build-daily-driver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: build-daily-driver-apk
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Accept SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build manager debug APK
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: shizuku-daily-driver-apk
          path: manager/build/outputs/apk/debug/*.apk
          if-no-files-found: error
