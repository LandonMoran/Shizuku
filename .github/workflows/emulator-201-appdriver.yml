name: emulator-201-appdriver

# Isolated test harness. Lives ONLY on claude/code-session-review-vp9clq* branches.
# Drives the EXTERNAL stress-tester app (landonmoran/test, v2.0) as a real Shizuku
# client that spams UserService bind/unbind against the forced-race server. The
# app's pass/fail oracle is a DIRECT binder connection (verifiedBind), so it does
# not depend on the flaky in-manager broadcast trigger or on logcat reads.
# Never merge this workflow (or the repro instrumentation it drives) into
# fix-userservice-token-race or any upstream PR branch.
on:
  push:
    branches:
      - claude/code-session-review-vp9clq
    paths:
      - '.github/workflows/emulator-201-appdriver.yml'
      - '.github/scripts/emulator-201-appdriver.sh'
      - 'starter/**'
      - 'server/**'
      - 'api/**'
  workflow_dispatch:

concurrency:
  group: emulator-201-appdriver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appdriver:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          # API-36 (Android 16) rig-validation: fixed leg only. The `-baseline`
          # sibling branch no longer exists on the remote, so its A/B leg is omitted
          # here; recreated separately for the drop-vs-rebind finding harness.
          - { name: fixed,    ref: claude/repro-userservice-drop-api36,         expect: clean }
        profile:
          - { name: fast,   cores: 4, ram: 4096M, heap: 1024M }
    name: appdriver-${{ matrix.variant.name }}-${{ matrix.profile.name }}
    steps:
      - name: Checkout Shizuku (server under test)
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.variant.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Checkout stress-tester app (the driver)
        uses: actions/checkout@v6
        with:
          repository: landonmoran/test
          ref: claude/code-session-review-vp9clq
          path: stress-app

      # NOTE: We deliberately do NOT override the api submodule to thedjchi's
      # Shizuku-API master (fa4e6a95). thedjchi's SHIPPING app (main repo 608fcf0e,
      # "13.7.0") pins its api submodule at 37ebcd3e, NOT the api-repo master - so
      # 37ebcd3e IS "thedjchi's latest app" for our purposes. The harness branches
      # already pin the right api per variant: baseline -> 37ebcd3e (stock, as the
      # app ships), fixed -> f9fe869e (37ebcd3e + the #201 fix). Forcing fa4e6a95
      # breaks the 13.7.0 manager build (that api isn't integrated into the app).

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Accept SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build manager debug APK (server under test)
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Build stress-tester app APK (the driver)
        working-directory: stress-app
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Ensure harness script is present for every variant
        # The emulator step runs .github/scripts/emulator-201-appdriver.sh from the
        # checked-out variant. The baseline branch doesn't carry the script, so pull
        # it from the harness branch - single source of truth, always in sync. (For
        # the fixed variant this is a harmless re-fetch of the same file.)
        run: |
          git fetch origin claude/code-session-review-vp9clq --depth=1
          git checkout FETCH_HEAD -- .github/scripts/emulator-201-appdriver.sh
          ls -la .github/scripts/emulator-201-appdriver.sh

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run #201 app-driver stress on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          VARIANT: ${{ matrix.variant.name }}
          EXPECT: ${{ matrix.variant.expect }}
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          cores: ${{ matrix.profile.cores }}
          ram-size: ${{ matrix.profile.ram }}
          heap-size: ${{ matrix.profile.heap }}
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none
          script: bash .github/scripts/emulator-201-appdriver.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: appdriver-${{ matrix.variant.name }}-${{ matrix.profile.name }}
          path: |
            logcat.txt
            stress_results.log
          if-no-files-found: warn
