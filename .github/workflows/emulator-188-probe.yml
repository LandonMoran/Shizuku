name: emulator-188-probe

# [repro] #188 environment recon. Boots a stock emulator and reports the ADB-port
# and Wi-Fi/network reality the A/B harness depends on. Drives no app code; pure
# recon. Lives ONLY on claude/code-session-review-vp9clq* branches, never merged.
on:
  workflow_dispatch:

concurrency:
  group: emulator-188-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: claude/code-session-review-vp9clq
          submodules: recursive
          fetch-depth: 0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Probe emulator ADB-port + Wi-Fi reality
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none
          script: bash .github/scripts/emulator-188-probe.sh
