name: emulator-188-tv

# [repro] #188 on Android TV. Legacy TV (API 30, SDK 30 < 33) so isTlsSupported()
# is false and the non-TLS-TV configured-port fallback is exercised. Proves the fix
# makes a TV use its CONFIGURED port (5555), not the stale persisted one (43217),
# where the phone path can't (TVs skip mDNS discovery). Harness-only.
on:
  push:
    branches:
      - claude/code-session-review-vp9clq
    paths:
      - '.github/workflows/emulator-188-tv.yml'
      - '.github/scripts/emulator-188-tv.sh'
      - 'manager/src/main/java/moe/shizuku/manager/utils/EnvironmentUtils.kt'
      - 'manager/src/main/java/moe/shizuku/manager/worker/AdbStartWorker.kt'
  workflow_dispatch:

concurrency:
  group: emulator-188-tv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tv:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Fixed variant only. The stale-persist A/B contrast isn't reproducible on
        # the TV image -- its SELinux policy blocks `setprop persist.adb.tcp.port`
        # ("Failed to set property ... See dmesg"), so no stale value can be planted.
        # Without one, stock and fixed both fall through to the configured-port
        # fallback (5555), so there is nothing to contrast. This job instead
        # CONFIRMS the fix's TV path executes correctly on a real Android TV
        # (leanback -> isTelevision, SDK<33 -> !isTlsSupported -> configured-port
        # fallback, worker runs). The persist-skip itself is code-guaranteed
        # (getLiveAdbTcpPort never reads persist on TV) and proven on the phone A/B.
        variant:
          - { name: fixed, ref: claude/code-session-review-vp9clq, expect: clean }
    name: 188-tv-${{ matrix.variant.name }}
    env:
      VARIANT: ${{ matrix.variant.name }}
      EXPECT: ${{ matrix.variant.expect }}
    steps:
      - name: Checkout ${{ matrix.variant.name }}
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.variant.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Sync canonical TV harness script
        run: |
          git fetch origin claude/code-session-review-vp9clq --depth=1
          git checkout FETCH_HEAD -- .github/scripts/emulator-188-tv.sh
          echo "TV harness script synced from claude/code-session-review-vp9clq"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Accept SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build manager debug APK
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run #188 TV A/B on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: android-tv
          arch: x86
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none
          script: bash .github/scripts/emulator-188-tv.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: emulator-188-tv-${{ matrix.variant.name }}
          path: logcat.txt
          if-no-files-found: warn
