name: CI Debug Build

on:
  push:
    branches:
      - claude/transfer-shizuku-repo-o5g7qh
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Accept SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build debug APK
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shizuku-android17-debug
          path: manager/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
