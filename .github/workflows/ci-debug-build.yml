name: CI Debug Build

on:
  push:
    branches:
      - fix-userservice-token-race
  workflow_dispatch:

concurrency:
  group: ci-debug-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Accept SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build debug APK
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Upload debug APK (artifact)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shizuku-fix-201-debug
          path: manager/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Publish APK as a Release (one-tap phone download)
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SRC_APK=$(ls manager/build/outputs/apk/debug/*.apk | head -n1)
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-10)
          RENAMED_APK="$(dirname "$SRC_APK")/shizuku-FIX201-latest-debug-${SHORT_SHA}.apk"
          cp "$SRC_APK" "$RENAMED_APK"
          echo "Publishing $RENAMED_APK as release fix-201"
          gh release delete fix-201 --yes --cleanup-tag 2>/dev/null || true
          gh release create fix-201 "$RENAMED_APK" \
            --target "$GITHUB_SHA" \
            --title "Shizuku #201 FIX build (debug) - commit ${SHORT_SHA}" \
            --notes "THIS IS THE #201 FIX BUILD, not a repro build and not the stress-tester app.

          Asset filename: shizuku-FIX201-latest-debug-${SHORT_SHA}.apk
          Built from commit: ${SHORT_SHA}

          Root-cause fix in the shared UserServiceManager.sendUserServiceLocked: an attach for an expired/evicted UserService token is no longer thrown as an exception - the orphaned binder is told to clean itself up and the caller's attach completes normally, no restart required.

          This release tag (fix-201) always points at the latest build from the fix-userservice-token-race branch - re-download from the same link any time to get the current version, and check the asset filename above/commit SHA to confirm freshness.

          Debug-signed, not for daily use." \
            --prerelease
