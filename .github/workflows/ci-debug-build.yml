name: CI Debug Build

on:
  push:
    branches:
      - fix-userservice-token-race
  workflow_dispatch:

concurrency:
  group: ci-debug-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Accept SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build debug APK
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Upload debug APK (artifact)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shizuku-fix-201-debug
          path: manager/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Publish APK as a Release (one-tap phone download)
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(ls manager/build/outputs/apk/debug/*.apk | head -n1)
          echo "Publishing $APK as release fix-201"
          gh release delete fix-201 --yes --cleanup-tag 2>/dev/null || true
          gh release create fix-201 "$APK" \
            --target "$GITHUB_SHA" \
            --title "Shizuku #201 fix build (debug)" \
            --notes "Debug build with the real fix for issue #201 (UserServiceManager token race). Root-cause fix in the shared UserServiceManager.sendUserServiceLocked: an attach for an expired/evicted token is no longer thrown as an exception - the orphaned binder is told to clean itself up and the caller's attach completes normally, no restart required.

          Debug-signed, not for daily use." \
            --prerelease
