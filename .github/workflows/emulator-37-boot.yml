name: emulator-37-boot

# [repro] Decisive check: can the runner actually boot an Android 17 (API 37)
# x86_64 emulator? The package index references android-37 but lists no installable
# x86_64 image. This tries for real. If it boots, we run the #188/#237 A/B on 37.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/code-session-review-vp9clq
    paths:
      - '.github/workflows/emulator-37-boot.yml'

jobs:
  boot37:
    runs-on: ubuntu-latest
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Try to boot Android 17 (API 37)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 37
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none
          script: |
            echo "sdk=$(adb shell getprop ro.build.version.sdk | tr -d '\r')"
            echo "release=$(adb shell getprop ro.build.version.release | tr -d '\r')"
            echo "codename=$(adb shell getprop ro.build.version.codename | tr -d '\r')"
            echo "ANDROID 17 BOOTED OK"
