name: emulator-237

# [repro] #237 A/B harness. TCP mode OFF + a configured ADB TCP port; brings up
# the emulator's unmetered AndroidWifi (required, since TCP-mode-off makes
# isWifiRequired true), drives the real AdbStartWorker, and checks whether it
# tears down TCP on a background start:
#   baseline (stock): AdbStarter.stopTcp invoked on start -> #237
#   fixed:            worker no longer calls stopTcp -> no teardown on start
# Harness-only; lives on claude/code-session-review-vp9clq* branches, never merged.
on:
  push:
    branches:
      - claude/code-session-review-vp9clq
    paths:
      - '.github/workflows/emulator-237.yml'
      - '.github/scripts/emulator-237.sh'
      - 'manager/src/main/java/moe/shizuku/manager/worker/AdbStartWorker.kt'
      - 'manager/src/main/java/moe/shizuku/manager/adb/AdbStarter.kt'
      - 'manager/src/main/java/moe/shizuku/manager/receiver/Repro237Receiver.kt'
  workflow_dispatch:

concurrency:
  group: emulator-237-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ab:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: fixed,    ref: claude/code-session-review-vp9clq,              expect: clean }
          - { name: baseline, ref: claude/code-session-review-vp9clq-237-baseline, expect: reproduce }
    name: 237-${{ matrix.variant.name }}
    env:
      VARIANT: ${{ matrix.variant.name }}
      EXPECT: ${{ matrix.variant.expect }}
    steps:
      - name: Checkout ${{ matrix.variant.name }}
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.variant.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Accept SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build manager debug APK
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run #237 A/B on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none
          script: bash .github/scripts/emulator-237.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: emulator-237-${{ matrix.variant.name }}
          path: logcat.txt
          if-no-files-found: warn
