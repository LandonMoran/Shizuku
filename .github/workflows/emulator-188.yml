name: emulator-188

# [repro] #188 A/B harness. Seeds a stale/dead persisted ADB TCP port, reboots
# (survives), drives the real AdbStartWorker via the harness receiver, and checks
# the port decision:
#   baseline (stock): useStaleDirect=true, resolves+connects to the dead port -> #188
#   fixed:            useStaleDirect=false, routed to discovery (dead port rejected)
# Deterministic bug -> a single emulator profile is sufficient (no timing fan-out).
# Harness-only; lives on claude/code-session-review-vp9clq* branches, never merged.
on:
  push:
    branches:
      - claude/code-session-review-vp9clq
    paths:
      - '.github/workflows/emulator-188.yml'
      - '.github/scripts/emulator-188.sh'
      - 'manager/src/main/java/moe/shizuku/manager/utils/EnvironmentUtils.kt'
      - 'manager/src/main/java/moe/shizuku/manager/worker/AdbStartWorker.kt'
      - 'manager/src/main/java/moe/shizuku/manager/receiver/Repro188Receiver.kt'
  workflow_dispatch:

concurrency:
  group: emulator-188-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ab:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: fixed,    ref: claude/code-session-review-vp9clq,              expect: clean }
          - { name: baseline, ref: claude/code-session-review-vp9clq-188-baseline, expect: reproduce }
        api: [30, 36]
    name: 188-${{ matrix.variant.name }}-api${{ matrix.api }}
    env:
      VARIANT: ${{ matrix.variant.name }}
      EXPECT: ${{ matrix.variant.expect }}
    steps:
      - name: Checkout ${{ matrix.variant.name }}
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.variant.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Sync canonical harness script (both variants run the same one)
        run: |
          git fetch origin claude/code-session-review-vp9clq --depth=1
          git checkout FETCH_HEAD -- .github/scripts/emulator-188.sh
          echo "harness script synced from claude/code-session-review-vp9clq"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Accept SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build manager debug APK
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run #188 A/B on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api }}
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none
          script: bash .github/scripts/emulator-188.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: emulator-188-${{ matrix.variant.name }}-api${{ matrix.api }}
          path: logcat.txt
          if-no-files-found: warn
